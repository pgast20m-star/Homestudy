<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sponsor Button</title>

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f5f5;
}

.sponsor-btn{
background:#ff4d6d;
color:white;
border:none;
padding:15px 30px;
font-size:20px;
border-radius:40px;
cursor:pointer;
transition:0.3s;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.sponsor-btn:hover{
transform:translateY(-5px) scale(1.1);
background:#ff1e4d;
}

</style>
</head>

<body>

<button class="sponsor-btn" onclick="sponsor()">❤️ Sponsor</button>

<script>

function sponsor(){
window.open("https://buymeacoffee.com/yourname");
}

</script>

</body>
</html># These are supported funding model platforms

github: # Replace with up to 4 GitHub Sponsors-enabled usernames e.g., [user1, user2]
